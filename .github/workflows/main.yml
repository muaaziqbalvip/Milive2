name: MI BOT PRO 24/7

on:
  push:
  workflow_dispatch:
  schedule:
    # Har 1 ghantay baad check karega (Cron)
    - cron: "0 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    # GitHub ki max limit 360 mins hoti hai, hum 350 pe stop karenge
    timeout-minutes: 350 

    # Ye part bot ko "Conflict" error se bachayega
    concurrency: 
      group: mi-bot-live
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot with Auto-Restart Loop
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GROQ_API: ${{ secrets.GROQ_API }}
        run: |
          # Internal loop taake agar bot crash ho to restart ho jaye
          while true; do
            python bot.py
            echo "Bot crashed or stopped. Restarting in 10 seconds..."
            sleep 10
          done
