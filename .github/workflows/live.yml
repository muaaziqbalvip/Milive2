name: 24/7 YouTube Live Stream (Pro) v3

on:
  workflow_dispatch:
    inputs:
      logo_url:
        description: 'Logo image URL (PNG with transparency preferred)'
        required: false
        default: 'https://i.ibb.co/LzVJvDVz/file-00000000e55c7206934d363686b152fe.png'
      logo_position:
        description: 'Logo position: topleft / topright / bottomleft / bottomright'
        required: false
        default: 'topright'
      quality_preset:
        description: 'Quality: low (1080p/3Mbps) | mid (1080p/4.5Mbps) | high (1080p/6Mbps)'
        required: false
        default: 'mid'
  schedule:
    - cron: '0 */5 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
      RTMP_URL: 'rtmp://a.rtmp.youtube.com/live2'
      LOGO_URL: ${{ github.event.inputs.logo_url || 'https://i.ibb.co/LzVJvDVz/file-00000000e55c7206934d363686b152fe.png' }}
      LOGO_POS: ${{ github.event.inputs.logo_position || 'topright' }}
      QUALITY:  ${{ github.event.inputs.quality_preset || 'mid' }}

    steps:
      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg curl

      - name: Download Logo
        run: |
          curl -sL "$LOGO_URL" -o logo_raw.png || true
          if [ ! -s logo_raw.png ]; then
            ffmpeg -f lavfi -i color=black@0:size=1x1:rate=1 \
              -frames:v 1 logo_raw.png -y -loglevel quiet
          fi
          ffmpeg -i logo_raw.png \
            -vf "scale='min(300,iw)':-1:flags=lanczos" \
            logo.png -y -loglevel quiet
          echo "=== Logo ready ==="

      - name: Set Quality Params
        run: |
          case "$QUALITY" in
            low)
              echo "VBR=3000k"     >> $GITHUB_ENV
              echo "MAXR=3000k"    >> $GITHUB_ENV
              echo "BUFS=6000k"    >> $GITHUB_ENV
              echo "PRESET=faster" >> $GITHUB_ENV
              ;;
            high)
              echo "VBR=6000k"     >> $GITHUB_ENV
              echo "MAXR=6000k"    >> $GITHUB_ENV
              echo "BUFS=12000k"   >> $GITHUB_ENV
              echo "PRESET=fast"   >> $GITHUB_ENV
              ;;
            *)
              echo "VBR=4500k"        >> $GITHUB_ENV
              echo "MAXR=4500k"       >> $GITHUB_ENV
              echo "BUFS=9000k"       >> $GITHUB_ENV
              echo "PRESET=veryfast"  >> $GITHUB_ENV
              ;;
          esac

      - name: Set Logo Overlay Position
        run: |
          case "$LOGO_POS" in
            topleft)     echo "OVERLAY_POS=20:20"         >> $GITHUB_ENV ;;
            bottomleft)  echo "OVERLAY_POS=20:H-h-20"     >> $GITHUB_ENV ;;
            bottomright) echo "OVERLAY_POS=W-w-20:H-h-20" >> $GITHUB_ENV ;;
            *)           echo "OVERLAY_POS=W-w-20:20"     >> $GITHUB_ENV ;;
          esac

      # ─── Pre-download All Videos ────────────────────────────────────────────
      - name: Pre-download All Videos
        run: |
          mkdir -p videos

          download_video() {
            local URL="$1"
            local FILE="$2"
            local RETRIES=5
            local ATTEMPT=0
            while [ $ATTEMPT -lt $RETRIES ]; do
              ATTEMPT=$((ATTEMPT+1))
              echo "[$(date)] Downloading $FILE (try $ATTEMPT)..."
              curl -sL --max-time 300 --retry 3 "$URL" -o "videos/${FILE}.mp4"
              local SIZE
              SIZE=$(stat -c%s "videos/${FILE}.mp4" 2>/dev/null || echo 0)
              if [ "$SIZE" -gt 102400 ]; then
                echo "[$(date)] $FILE OK (${SIZE} bytes)"
                return 0
              fi
              echo "[$(date)] WARN: $FILE too small. Retry..."
              sleep 5
            done
            echo "[$(date)] ERROR: $FILE failed after $RETRIES attempts!"
            return 1
          }

          download_video "https://muaaziqbalvip.github.io/Milive2/6.mp4" "v6"
          download_video "https://muaaziqbalvip.github.io/Milive2/1.mp4" "v1"
          download_video "https://muaaziqbalvip.github.io/Milive2/2.mp4" "v2"
          download_video "https://muaaziqbalvip.github.io/Milive2/5.mp4" "v5"
          download_video "https://muaaziqbalvip.github.io/Milive2/3.mp4" "v3"
          download_video "https://muaaziqbalvip.github.io/Milive2/0.mp4" "v0_ad"
          download_video "https://muaaziqbalvip.github.io/Milive2/4.mp4" "v4"

          echo "=== Saari videos ready ==="
          ls -lh videos/

      # ─── Main Stream Loop ───────────────────────────────────────────────────
      - name: Start 24/7 HD Stream
        run: |
          echo "Stream shuru: $(date) | Quality: $QUALITY | Bitrate: $VBR"

          stream_local_video() {
            local FILE="$1"
            local NOW_TEXT="$2"    # e.g.  NOW- PANIYON KI DUA
            local NEXT_TEXT="$3"   # e.g.  NEXT- FAJAR KA SUKOON

            echo "[$(date)] Playing: $NOW_TEXT"

            # KEY FIX:
            # drawtext ke text= mein single quotes BILKUL mat lagao.
            # Special chars (colon, backslash) ko FFmpeg style se escape karo:
            #   colon  →  \:
            #   single quote inside text → \'  (nahi chahiye agar hataao)
            # filter_complex poora double-quote mein wrap hai — bash expansion hogi
            # lekin single-quote clash nahi hoga.

            ffmpeg \
              -loglevel warning \
              -fflags +genpts+discardcorrupt \
              -err_detect ignore_err \
              -re \
              -i "$FILE" \
              -i logo.png \
              -filter_complex \
"[0:v]scale=1920:1080:force_original_aspect_ratio=decrease,pad=1920:1080:(ow-iw)/2:(oh-ih)/2:black,setsar=1,fps=30[base];[1:v]format=rgba,colorchannelmixer=aa=0.85[logo];[base][logo]overlay=${OVERLAY_POS}:format=auto[withlogo];[withlogo]drawtext=text=${NOW_TEXT}:fontsize=32:fontcolor=white:box=1:boxcolor=black@0.6:boxborderw=8:x=20:y=H-th-90:shadowx=2:shadowy=2,drawtext=text=${NEXT_TEXT}:fontsize=26:fontcolor=yellow:box=1:boxcolor=black@0.6:boxborderw=8:x=20:y=H-th-45:shadowx=2:shadowy=2[outv]" \
              -map "[outv]" \
              -map 0:a \
              -avoid_negative_ts make_zero \
              -c:v libx264 \
              -preset "$PRESET" \
              -tune zerolatency \
              -profile:v high \
              -level 4.2 \
              -b:v "$VBR" \
              -maxrate "$MAXR" \
              -bufsize "$BUFS" \
              -g 60 \
              -keyint_min 60 \
              -sc_threshold 0 \
              -pix_fmt yuv420p \
              -c:a aac \
              -b:a 160k \
              -ar 44100 \
              -ac 2 \
              -flvflags no_duration_filesize \
              -f flv \
              "${RTMP_URL}/${STREAM_KEY}" \
              2>&1 | tee -a stream.log

            local EXIT=$?
            echo "[$(date)] Done: $NOW_TEXT | exit=$EXIT"
            [ $EXIT -ne 0 ] && sleep 8
            return $EXIT
          }

          # ── Playlist ──
          # IMPORTANT: Title mein spaces theek hain lekin colon (:) ya quote (') mat rakho
          # Agar chahiye toh replace karo with dash (-)
          VIDEOS=(
            "videos/v6.mp4|NOW- PANIYON KI DUA|NEXT- FAJAR KA SUKOON"
            "videos/v1.mp4|NOW- FAJAR KA SUKOON|NEXT- SUKOON E ISHA"
            "videos/v2.mp4|NOW- SUKOON E ISHA|NEXT- ROH KI PYASS"
            "videos/v5.mp4|NOW- ROH KI PYASS|NEXT- TASKEEN SE BHAR"
            "videos/v3.mp4|NOW- TASKEEN SE BHAR|NEXT- SUCH KI TALWAR"
            "videos/v4.mp4|NOW- SUCH KI TALWAR|NEXT- PANIYON KI DUA"
          )

          AD_FILE="videos/v0_ad.mp4"
          AD_NOW="NOW- Special OFFER"

          TOTAL=${#VIDEOS[@]}

          # ── Infinite loop ──
          while true; do
            for (( i=0; i<TOTAL; i++ )); do

              IFS='|' read -r VF NOW_T NEXT_T <<< "${VIDEOS[$i]}"

              # Next video ka next title (for ad's NEXT label)
              NEXT_INDEX=$(( (i+1) % TOTAL ))
              IFS='|' read -r _ AFTER_NEXT _ <<< "${VIDEOS[$NEXT_INDEX]}"

              echo "=============================="
              echo "[$(date)] $NOW_T"
              echo "[$(date)] $NEXT_T"
              echo "=============================="

              if [ ! -f "$VF" ]; then
                echo "[$(date)] SKIP: $VF nahi mila!"
                continue
              fi

              # Main video
              stream_local_video "$VF" "$NOW_T" "$NEXT_T" || true

              # Ad
              if [ -f "$AD_FILE" ]; then
                echo "[$(date)] AD shuru..."
                stream_local_video "$AD_FILE" "$AD_NOW" "$NEXT_T" || true
                echo "[$(date)] AD khatam."
              fi

              sleep 2
            done

            echo "[$(date)] Playlist complete — phir se shuru..."
            sleep 3
          done

      - name: Upload Stream Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stream-log-${{ github.run_number }}
          path: stream.log
          retention-days: 3
