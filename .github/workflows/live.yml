name: 24/7 YouTube Live Stream (Pro)

on:
  workflow_dispatch:
    inputs:
      logo_url:
        description: 'Logo image URL (PNG with transparency preferred)'
        required: false
        default: 'https://i.ibb.co/LzVJvDVz/file-00000000e55c7206934d363686b152fe.png'
      logo_position:
        description: 'Logo position: topleft / topright / bottomleft / bottomright'
        required: false
        default: 'topright'
      quality_preset:
        description: 'Quality: low (1080p/3Mbps) | mid (1080p/4.5Mbps) | high (1080p/6Mbps)'
        required: false
        default: 'mid'
  schedule:
    - cron: '0 */5 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
      RTMP_URL: 'rtmp://a.rtmp.youtube.com/live2'
      LOGO_URL: ${{ github.event.inputs.logo_url || 'https://i.ibb.co/LzVJvDVz/file-00000000e55c7206934d363686b152fe.png' }}
      LOGO_POS: ${{ github.event.inputs.logo_position || 'topright' }}
      QUALITY:  ${{ github.event.inputs.quality_preset || 'mid' }}

    steps:
      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg curl

      - name: Download Logo
        run: |
          curl -sL "$LOGO_URL" -o logo_raw.png || true
          if [ ! -s logo_raw.png ]; then
            ffmpeg -f lavfi -i color=black@0:size=1x1:rate=1 \
              -frames:v 1 logo_raw.png -y -loglevel quiet
          fi
          ffmpeg -i logo_raw.png \
            -vf "scale='min(300,iw)':-1:flags=lanczos" \
            logo.png -y -loglevel quiet
          echo "=== Logo ready ==="

      - name: Set Quality Params
        run: |
          case "$QUALITY" in
            low)
              echo "VBR=3000k"     >> $GITHUB_ENV
              echo "MAXR=3000k"    >> $GITHUB_ENV
              echo "BUFS=6000k"    >> $GITHUB_ENV
              echo "PRESET=faster" >> $GITHUB_ENV
              ;;
            high)
              echo "VBR=6000k"     >> $GITHUB_ENV
              echo "MAXR=6000k"    >> $GITHUB_ENV
              echo "BUFS=12000k"   >> $GITHUB_ENV
              echo "PRESET=fast"   >> $GITHUB_ENV
              ;;
            *)
              echo "VBR=4500k"        >> $GITHUB_ENV
              echo "MAXR=4500k"       >> $GITHUB_ENV
              echo "BUFS=9000k"       >> $GITHUB_ENV
              echo "PRESET=veryfast"  >> $GITHUB_ENV
              ;;
          esac

      - name: Set Logo Overlay Position
        run: |
          case "$LOGO_POS" in
            topleft)     echo "OVERLAY_POS=20:20"         >> $GITHUB_ENV ;;
            bottomleft)  echo "OVERLAY_POS=20:H-h-20"     >> $GITHUB_ENV ;;
            bottomright) echo "OVERLAY_POS=W-w-20:H-h-20" >> $GITHUB_ENV ;;
            *)           echo "OVERLAY_POS=W-w-20:20"     >> $GITHUB_ENV ;;
          esac

      # ─── Main Stream Loop ───────────────────────────────────────────────────
      - name: Start 24/7 HD Stream
        run: |
          echo "=============================="
          echo "Stream shuru: $(date)"
          echo "Quality: $QUALITY | Bitrate: $VBR"
          echo "=============================="

          # ── Video list: URL|Title ──
          VIDEOS=(
            "https://muaaziqbalvip.github.io/Milive2/6.mp4|PANIYON KI DUA"
            "https://muaaziqbalvip.github.io/Milive2/1.mp4|FAJAR KA SUKOON"
            "https://muaaziqbalvip.github.io/Milive2/2.mp4|SUKOON-E-ISHA"
            "https://muaaziqbalvip.github.io/Milive2/5.mp4|ROH KI PYASS"
            "https://muaaziqbalvip.github.io/Milive2/3.mp4|TSKEEN SE POUR"
            "https://muaaziqbalvip.github.io/Milive2/4.mp4|SUCH KI TALWAR"
          )

          AD_URL="https://muaaziqbalvip.github.io/Milive2/0.mp4"
          AD_TITLE="--- Special OFFER"

          TOTAL=${#VIDEOS[@]}
          # ── FIX: Separate error counter - playlist loop is NOT a failure ──
          STREAM_ERROR_COUNT=0
          MAX_ERRORS=10

          # ── Helper: stream one video with full retry logic ──
          stream_video() {
            local INPUT_URL="$1"
            local CURRENT_TITLE="$2"
            local NEXT_TITLE="$3"
            local MAX_RETRIES=5
            local RETRY=0

            # ── FIX: Pre-download video to avoid mid-stream network cuts ──
            echo "[$(date)] Downloading: $CURRENT_TITLE"
            local TMP_FILE
            TMP_FILE=$(mktemp /tmp/stream_XXXXXX.mp4)

            # Try downloading with retries
            local DL_OK=0
            for attempt in 1 2 3; do
              if curl -sL --retry 3 --retry-delay 2 \
                   --connect-timeout 30 --max-time 600 \
                   "$INPUT_URL" -o "$TMP_FILE" && [ -s "$TMP_FILE" ]; then
                DL_OK=1
                echo "[$(date)] Download OK (attempt $attempt): $CURRENT_TITLE"
                break
              else
                echo "[$(date)] Download attempt $attempt failed, retrying..."
                sleep 5
              fi
            done

            if [ "$DL_OK" -eq 0 ]; then
              echo "[$(date)] WARN: Could not download $CURRENT_TITLE — skipping."
              rm -f "$TMP_FILE"
              return 1
            fi

            # ── FIX: Stream from local file - no more mid-video cuts ──
            while [ $RETRY -lt $MAX_RETRIES ]; do

              # Pakistan Standard Time = UTC+5
              # drawtext with PKT time displayed live
              ffmpeg \
                -re \
                -i "$TMP_FILE" \
                -i logo.png \
                -filter_complex \
                  "[0:v]scale=1920:1080:force_original_aspect_ratio=decrease,\
                   pad=1920:1080:(ow-iw)/2:(oh-ih)/2:black,\
                   setsar=1,fps=30[base];\
                   [1:v]format=rgba,colorchannelmixer=aa=0.85[logo];\
                   [base][logo]overlay=${OVERLAY_POS}:format=auto[withlogo];\
                   [withlogo]\
                   drawbox=x=10:y=10:w=300:h=52:color=0x000000AA:t=fill,\
                   drawbox=x=12:y=12:w=296:h=48:color=0xFFFFFF18:t=2,\
                   drawtext=\
                     text='🕐 %{pts\\:localtime\\:$(date -u +%s -d '+5 hours')}':fontsize=22:fontcolor=0xFFD700:\
                     x=22:y=22:shadowx=1:shadowy=1,\
                   drawbox=x=10:y=H-130:w=520:h=118:color=0x000000BB:t=fill,\
                   drawbox=x=12:y=H-128:w=516:h=114:color=0xFFFFFF15:t=2,\
                   drawbox=x=12:y=H-128:w=516:h=4:color=0xFF4444FF:t=fill,\
                   drawtext=\
                     text='▶  NOW':fontsize=16:fontcolor=0xFF6666:\
                     x=22:y=H-118:shadowx=1:shadowy=1,\
                   drawtext=\
                     text='${CURRENT_TITLE}':fontsize=30:fontcolor=white:\
                     x=22:y=H-96:shadowx=2:shadowy=2,\
                   drawbox=x=12:y=H-58:w=516:h=2:color=0xFFFFFF33:t=fill,\
                   drawtext=\
                     text='▷  NEXT':fontsize=14:fontcolor=0xFFD700:\
                     x=22:y=H-52:shadowx=1:shadowy=1,\
                   drawtext=\
                     text='${NEXT_TITLE}':fontsize=24:fontcolor=0xCCCCCC:\
                     x=22:y=H-34:shadowx=1:shadowy=1[outv]" \
                -map "[outv]" \
                -map 0:a \
                -c:v libx264 \
                -preset "$PRESET" \
                -tune zerolatency \
                -profile:v high \
                -level 4.2 \
                -b:v "$VBR" \
                -maxrate "$MAXR" \
                -bufsize "$BUFS" \
                -g 60 \
                -keyint_min 60 \
                -sc_threshold 0 \
                -pix_fmt yuv420p \
                -c:a aac \
                -b:a 160k \
                -ar 44100 \
                -ac 2 \
                -avoid_negative_ts make_zero \
                -fflags +genpts \
                -flvflags no_duration_filesize \
                -f flv \
                "${RTMP_URL}/${STREAM_KEY}" \
                2>&1 | tee -a stream.log

              EXIT_CODE=${PIPESTATUS[0]}

              if [ "$EXIT_CODE" -eq 0 ]; then
                echo "[$(date)] ✅ Video complete: $CURRENT_TITLE"
                STREAM_ERROR_COUNT=0
                break
              else
                RETRY=$((RETRY + 1))
                STREAM_ERROR_COUNT=$((STREAM_ERROR_COUNT + 1))
                echo "[$(date)] ⚠️  Stream error (exit $EXIT_CODE) — retry $RETRY/$MAX_RETRIES"

                # ── FIX: If too many consecutive errors, wait longer ──
                if [ "$STREAM_ERROR_COUNT" -ge "$MAX_ERRORS" ]; then
                  echo "[$(date)] 🔴 Too many errors ($STREAM_ERROR_COUNT) — waiting 60s before retry..."
                  sleep 60
                  STREAM_ERROR_COUNT=0
                else
                  sleep $((RETRY * 5))
                fi
              fi
            done

            rm -f "$TMP_FILE"

            if [ $RETRY -ge $MAX_RETRIES ]; then
              echo "[$(date)] ❌ Skipping $CURRENT_TITLE after $MAX_RETRIES failed attempts."
              return 1
            fi
            return 0
          }

          # ── Infinite loop — never stops ──
          while true; do
            for (( i=0; i<TOTAL; i++ )); do

              CURRENT_ENTRY="${VIDEOS[$i]}"
              CURRENT_URL="${CURRENT_ENTRY%%|*}"
              CURRENT_TITLE="${CURRENT_ENTRY##*|}"

              NEXT_INDEX=$(( (i+1) % TOTAL ))
              NEXT_ENTRY="${VIDEOS[$NEXT_INDEX]}"
              NEXT_TITLE="${NEXT_ENTRY##*|}"

              echo "=============================="
              echo "[$(date)] NOW PLAYING : $CURRENT_TITLE"
              echo "[$(date)] UP NEXT     : $NEXT_TITLE"
              echo "=============================="

              stream_video "$CURRENT_URL" "$CURRENT_TITLE" "$NEXT_TITLE"

              # ── Play Ad after each video ──
              echo "[$(date)] 📢 Ad chal rahi hai..."
              stream_video "$AD_URL" "$AD_TITLE" "$NEXT_TITLE"

              echo "[$(date)] ✅ Ad khatam — next video load ho rahi hai..."
              sleep 2

            done

            echo "[$(date)] 🔄 Playlist complete — restart ho raha hai..."
            # ── FIX: No FAIL_COUNT here — this is NORMAL behaviour ──
            sleep 2

          done

      - name: Upload Stream Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stream-log-${{ github.run_number }}
          path: stream.log
          retention-days: 3
