name: 24/7 YouTube Live Stream (Pro)

on:
  workflow_dispatch:
    inputs:
      logo_url:
        description: 'Logo image URL (PNG with transparency preferred)'
        required: false
        default: 'https://i.ibb.co/LzVJvDVz/file-00000000e55c7206934d363686b152fe.png'
      logo_position:
        description: 'Logo position: topleft / topright / bottomleft / bottomright'
        required: false
        default: 'topright'
      quality_preset:
        description: 'Quality: low (1080p/3Mbps) | mid (1080p/4.5Mbps) | high (1080p/6Mbps)'
        required: false
        default: 'mid'
  schedule:
    - cron: '0 */5 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
      RTMP_URL: 'rtmp://a.rtmp.youtube.com/live2'
      LOGO_URL: ${{ github.event.inputs.logo_url || 'https://i.ibb.co/LzVJvDVz/file-00000000e55c7206934d363686b152fe.png' }}
      LOGO_POS: ${{ github.event.inputs.logo_position || 'topright' }}
      QUALITY:  ${{ github.event.inputs.quality_preset || 'mid' }}

    steps:
      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg curl

      - name: Download Logo
        run: |
          curl -sL "$LOGO_URL" -o logo_raw.png || true
          if [ ! -s logo_raw.png ]; then
            ffmpeg -f lavfi -i color=black@0:size=1x1:rate=1 \
              -frames:v 1 logo_raw.png -y -loglevel quiet
          fi
          ffmpeg -i logo_raw.png \
            -vf "scale='min(300,iw)':-1:flags=lanczos" \
            logo.png -y -loglevel quiet
          echo "=== Logo ready ==="

      - name: Set Quality Params
        run: |
          case "$QUALITY" in
            low)
              echo "VBR=3000k"     >> $GITHUB_ENV
              echo "MAXR=3000k"    >> $GITHUB_ENV
              echo "BUFS=6000k"    >> $GITHUB_ENV
              echo "PRESET=faster" >> $GITHUB_ENV
              ;;
            high)
              echo "VBR=6000k"     >> $GITHUB_ENV
              echo "MAXR=6000k"    >> $GITHUB_ENV
              echo "BUFS=12000k"   >> $GITHUB_ENV
              echo "PRESET=fast"   >> $GITHUB_ENV
              ;;
            *)
              echo "VBR=4500k"        >> $GITHUB_ENV
              echo "MAXR=4500k"       >> $GITHUB_ENV
              echo "BUFS=9000k"       >> $GITHUB_ENV
              echo "PRESET=veryfast"  >> $GITHUB_ENV
              ;;
          esac

      - name: Set Logo Overlay Position
        run: |
          case "$LOGO_POS" in
            topleft)     echo "OVERLAY_POS=20:20"         >> $GITHUB_ENV ;;
            bottomleft)  echo "OVERLAY_POS=20:H-h-20"     >> $GITHUB_ENV ;;
            bottomright) echo "OVERLAY_POS=W-w-20:H-h-20" >> $GITHUB_ENV ;;
            *)           echo "OVERLAY_POS=W-w-20:20"     >> $GITHUB_ENV ;;
          esac

      - name: Start 24/7 HD Stream
        run: |
          echo "=============================="
          echo "Stream shuru: $(date)"
          echo "Quality: $QUALITY | Bitrate: $VBR"
          echo "=============================="

          INTRO_OUTRO_URL="https://muaaziqbalvip.github.io/Milive2/lv_0_20260530230632.mp4"

          VIDEOS=(
            "https://muaaziqbalvip.github.io/Milive2/1.mp4|FAJAR KA SUKOON"
            "https://muaaziqbalvip.github.io/Milive2/1.mp4|SUKOON-E-ISHA"
            "https://muaaziqbalvip.github.io/Milive2/1.mp4|ROH KI PYASS"
            "https://muaaziqbalvip.github.io/Milive2/1.mp4|TSKEEN SE POUR"
            "https://muaaziqbalvip.github.io/Milive2/1.mp4|SUCH KI TALWAR"
          )

          AD_URL="https://muaaziqbalvip.github.io/Milive2/1.mp4"
          AD_TITLE="--- Special OFFER"

          TOTAL=${#VIDEOS[@]}
          FAIL_COUNT=0

          while true; do
            for (( i=0; i<TOTAL; i++ )); do

              CURRENT_ENTRY="${VIDEOS[$i]}"
              CURRENT_URL="${CURRENT_ENTRY%%|*}"
              CURRENT_TITLE="${CURRENT_ENTRY##*|}"

              NEXT_INDEX=$(( (i+1) % TOTAL ))
              NEXT_ENTRY="${VIDEOS[$NEXT_INDEX]}"
              NEXT_TITLE="${NEXT_ENTRY##*|}"

              # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
              # INTRO animation video (har video se pehle)
              # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
              echo "[$(date)] >>> INTRO playing..."
              PKT_EPOCH=$(TZ=Asia/Karachi date +%s)

              ffmpeg \
                -re \
                -i "$INTRO_OUTRO_URL" \
                -i logo.png \
                -filter_complex \
"[0:v]scale=1920:1080:force_original_aspect_ratio=decrease,\
pad=1920:1080:(ow-iw)/2:(oh-ih)/2:black,setsar=1,fps=30[base];\
[1:v]format=rgba,colorchannelmixer=aa=0.85,\
fade=t=in:st=0:d=1:alpha=1[logo];\
[base][logo]overlay=${OVERLAY_POS}:format=auto[wl];\
[wl]drawbox=x=W-330:y=130:w=310:h=50:color=black@0.75:t=fill[b1];\
[b1]drawbox=x=W-330:y=130:w=4:h=50:color=00FFFF:t=fill[b2];\
[b2]drawtext=text='%{pts\:localtime\:${PKT_EPOCH}\:%I\\\:%M\\\:%S %p}':fontsize=22:fontcolor=00FFFF:x=W-320:y=140:shadowx=1:shadowy=1[b3];\
[b3]drawtext=text='PAKISTAN TIME':fontsize=16:fontcolor=aaaaaa:x=W-320:y=165:shadowx=1:shadowy=1[outv]" \
                -map "[outv]" \
                -map 0:a \
                -c:v libx264 -preset "$PRESET" -tune zerolatency \
                -profile:v high -level 4.2 \
                -b:v "$VBR" -maxrate "$MAXR" -bufsize "$BUFS" \
                -g 60 -keyint_min 60 -sc_threshold 0 \
                -pix_fmt yuv420p \
                -c:a aac -b:a 160k -ar 44100 -ac 2 \
                -flvflags no_duration_filesize \
                -f flv "${RTMP_URL}/${STREAM_KEY}" \
                2>&1 | tee -a stream.log

              # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
              # MAIN VIDEO
              # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
              echo "[$(date)] >>> NOW: $CURRENT_TITLE | NEXT: $NEXT_TITLE"
              PKT_EPOCH=$(TZ=Asia/Karachi date +%s)

              ffmpeg \
                -re \
                -i "$CURRENT_URL" \
                -i logo.png \
                -filter_complex \
"[0:v]scale=1920:1080:force_original_aspect_ratio=decrease,\
pad=1920:1080:(ow-iw)/2:(oh-ih)/2:black,setsar=1,fps=30[base];\
[1:v]format=rgba,colorchannelmixer=aa=0.85,\
fade=t=in:st=0:d=1:alpha=1[logo];\
[base][logo]overlay=${OVERLAY_POS}:format=auto[wl];\
[wl]drawbox=x=W-330:y=130:w=310:h=50:color=black@0.75:t=fill[b1];\
[b1]drawbox=x=W-330:y=130:w=4:h=50:color=00FFFF:t=fill[b2];\
[b2]drawtext=text='%{pts\:localtime\:${PKT_EPOCH}\:%I\\\:%M\\\:%S %p}':fontsize=22:fontcolor=00FFFF:x=W-320:y=140:shadowx=1:shadowy=1[b3];\
[b3]drawtext=text='PAKISTAN TIME':fontsize=16:fontcolor=aaaaaa:x=W-320:y=165:shadowx=1:shadowy=1[b4];\
[b4]drawbox=x=10:y=H-130:w=900:h=58:color=0x0a0a0a@0.88:t=fill[b5];\
[b5]drawbox=x=10:y=H-130:w=6:h=58:color=00FF88:t=fill[b6];\
[b6]drawtext=text='NOW  \:  ${CURRENT_TITLE}':fontsize=33:fontcolor=white:x=26:y=H-122:shadowx=2:shadowy=2[b7];\
[b7]drawbox=x=10:y=H-64:w=900:h=46:color=0x0a0a0a@0.82:t=fill[b8];\
[b8]drawbox=x=10:y=H-64:w=6:h=46:color=FFD700:t=fill[b9];\
[b9]drawtext=text='NEXT  \:  ${NEXT_TITLE}':fontsize=27:fontcolor=FFD700:x=26:y=H-58:shadowx=2:shadowy=2[outv]" \
                -map "[outv]" \
                -map 0:a \
                -c:v libx264 -preset "$PRESET" -tune zerolatency \
                -profile:v high -level 4.2 \
                -b:v "$VBR" -maxrate "$MAXR" -bufsize "$BUFS" \
                -g 60 -keyint_min 60 -sc_threshold 0 \
                -pix_fmt yuv420p \
                -c:a aac -b:a 160k -ar 44100 -ac 2 \
                -flvflags no_duration_filesize \
                -f flv "${RTMP_URL}/${STREAM_KEY}" \
                2>&1 | tee -a stream.log

              echo "[$(date)] Video exit: ${PIPESTATUS[0]}"

              # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
              # OUTRO animation video (har video ke baad)
              # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
              echo "[$(date)] >>> OUTRO playing..."
              PKT_EPOCH=$(TZ=Asia/Karachi date +%s)

              ffmpeg \
                -re \
                -i "$INTRO_OUTRO_URL" \
                -i logo.png \
                -filter_complex \
"[0:v]scale=1920:1080:force_original_aspect_ratio=decrease,\
pad=1920:1080:(ow-iw)/2:(oh-ih)/2:black,setsar=1,fps=30[base];\
[1:v]format=rgba,colorchannelmixer=aa=0.85,\
fade=t=in:st=0:d=1:alpha=1[logo];\
[base][logo]overlay=${OVERLAY_POS}:format=auto[wl];\
[wl]drawbox=x=W-330:y=130:w=310:h=50:color=black@0.75:t=fill[b1];\
[b1]drawbox=x=W-330:y=130:w=4:h=50:color=00FFFF:t=fill[b2];\
[b2]drawtext=text='%{pts\:localtime\:${PKT_EPOCH}\:%I\\\:%M\\\:%S %p}':fontsize=22:fontcolor=00FFFF:x=W-320:y=140:shadowx=1:shadowy=1[b3];\
[b3]drawtext=text='PAKISTAN TIME':fontsize=16:fontcolor=aaaaaa:x=W-320:y=165:shadowx=1:shadowy=1[outv]" \
                -map "[outv]" \
                -map 0:a \
                -c:v libx264 -preset "$PRESET" -tune zerolatency \
                -profile:v high -level 4.2 \
                -b:v "$VBR" -maxrate "$MAXR" -bufsize "$BUFS" \
                -g 60 -keyint_min 60 -sc_threshold 0 \
                -pix_fmt yuv420p \
                -c:a aac -b:a 160k -ar 44100 -ac 2 \
                -flvflags no_duration_filesize \
                -f flv "${RTMP_URL}/${STREAM_KEY}" \
                2>&1 | tee -a stream.log

              # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
              # AD VIDEO
              # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
              echo "[$(date)] >>> AD playing..."
              PKT_EPOCH=$(TZ=Asia/Karachi date +%s)

              ffmpeg \
                -re \
                -i "$AD_URL" \
                -i logo.png \
                -filter_complex \
"[0:v]scale=1920:1080:force_original_aspect_ratio=decrease,\
pad=1920:1080:(ow-iw)/2:(oh-ih)/2:black,setsar=1,fps=30[base];\
[1:v]format=rgba,colorchannelmixer=aa=0.85,\
fade=t=in:st=0:d=1:alpha=1[logo];\
[base][logo]overlay=${OVERLAY_POS}:format=auto[wl];\
[wl]drawbox=x=W-330:y=130:w=310:h=50:color=black@0.75:t=fill[b1];\
[b1]drawbox=x=W-330:y=130:w=4:h=50:color=00FFFF:t=fill[b2];\
[b2]drawtext=text='%{pts\:localtime\:${PKT_EPOCH}\:%I\\\:%M\\\:%S %p}':fontsize=22:fontcolor=00FFFF:x=W-320:y=140:shadowx=1:shadowy=1[b3];\
[b3]drawtext=text='PAKISTAN TIME':fontsize=16:fontcolor=aaaaaa:x=W-320:y=165:shadowx=1:shadowy=1[b4];\
[b4]drawbox=x=10:y=H-130:w=900:h=58:color=0x0a0a0a@0.88:t=fill[b5];\
[b5]drawbox=x=10:y=H-130:w=6:h=58:color=FF4444:t=fill[b6];\
[b6]drawtext=text='${AD_TITLE}':fontsize=33:fontcolor=white:x=26:y=H-122:shadowx=2:shadowy=2[b7];\
[b7]drawbox=x=10:y=H-64:w=900:h=46:color=0x0a0a0a@0.82:t=fill[b8];\
[b8]drawbox=x=10:y=H-64:w=6:h=46:color=FFD700:t=fill[b9];\
[b9]drawtext=text='NEXT  \:  ${NEXT_TITLE}':fontsize=27:fontcolor=FFD700:x=26:y=H-58:shadowx=2:shadowy=2[outv]" \
                -map "[outv]" \
                -map 0:a \
                -c:v libx264 -preset "$PRESET" -tune zerolatency \
                -profile:v high -level 4.2 \
                -b:v "$VBR" -maxrate "$MAXR" -bufsize "$BUFS" \
                -g 60 -keyint_min 60 -sc_threshold 0 \
                -pix_fmt yuv420p \
                -c:a aac -b:a 160k -ar 44100 -ac 2 \
                -flvflags no_duration_filesize \
                -f flv "${RTMP_URL}/${STREAM_KEY}" \
                2>&1 | tee -a stream.log

              echo "[$(date)] AD done. Next video load ho rahi hai..."
              sleep 2

            done

            echo "[$(date)] Playlist complete â€” restart ho raha hai..."
            FAIL_COUNT=$((FAIL_COUNT + 1))
            if [ "$FAIL_COUNT" -gt 5 ]; then
              sleep 30
            else
              sleep 3
            fi

          done

      - name: Upload Stream Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stream-log-${{ github.run_number }}
          path: stream.log
          retention-days: 3