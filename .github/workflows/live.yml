name: 24/7 YouTube Live Stream (Pro Fixed)

on:
  workflow_dispatch:
    inputs:
      logo_url:
        description: 'Logo image URL (PNG with transparency preferred)'
        required: false
        default: 'https://i.ibb.co/LzVJvDVz/file-00000000e55c7206934d363686b152fe.png'
      logo_position:
        description: 'Logo position: topleft / topright / bottomleft / bottomright'
        required: false
        default: 'topright'
      quality_preset:
        description: 'Quality: low (1080p/3Mbps) | mid (1080p/4.5Mbps) | high (1080p/6Mbps)'
        required: false
        default: 'mid'
  schedule:
    - cron: '0 */5 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 370

    env:
      STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
      RTMP_URL: 'rtmp://a.rtmp.youtube.com/live2'
      LOGO_URL: ${{ github.event.inputs.logo_url || 'https://i.ibb.co/LzVJvDVz/file-00000000e55c7206934d363686b152fe.png' }}
      LOGO_POS: ${{ github.event.inputs.logo_position || 'topright' }}
      QUALITY:  ${{ github.event.inputs.quality_preset || 'mid' }}

    steps:
      - name: Install FFmpeg & Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg curl tzdata

          sudo timedatectl set-timezone Asia/Karachi

ffmpeg -version | head -1
date

      - name: Download Logo
        run: |
          curl -sL "$LOGO_URL" -o logo_raw.png || true
          if [ ! -s logo_raw.png ]; then
            echo "Logo download failed, creating transparent placeholder"
            ffmpeg -f lavfi -i color=black@0:size=1x1:rate=1 \
              -frames:v 1 logo_raw.png -y -loglevel quiet
          fi
          ffmpeg -i logo_raw.png \
            -vf "scale='min(300,iw)':-1:flags=lanczos" \
            logo.png -y -loglevel quiet
          echo "=== Logo ready ==="

      - name: Set Quality Params
        run: |
          case "$QUALITY" in
            low)
              echo "VBR=3000k"     >> $GITHUB_ENV
              echo "MAXR=3000k"    >> $GITHUB_ENV
              echo "BUFS=6000k"    >> $GITHUB_ENV
              echo "PRESET=faster" >> $GITHUB_ENV
              ;;
            high)
              echo "VBR=6000k"     >> $GITHUB_ENV
              echo "MAXR=6000k"    >> $GITHUB_ENV
              echo "BUFS=12000k"   >> $GITHUB_ENV
              echo "PRESET=fast"   >> $GITHUB_ENV
              ;;
            *)
              echo "VBR=4500k"        >> $GITHUB_ENV
              echo "MAXR=4500k"       >> $GITHUB_ENV
              echo "BUFS=9000k"       >> $GITHUB_ENV
              echo "PRESET=veryfast"  >> $GITHUB_ENV
              ;;
          esac

      - name: Set Logo Overlay Position
        run: |
          case "$LOGO_POS" in
            topleft)     echo "OVERLAY_POS=20:20"         >> $GITHUB_ENV ;;
            bottomleft)  echo "OVERLAY_POS=20:H-h-20"     >> $GITHUB_ENV ;;
            bottomright) echo "OVERLAY_POS=W-w-20:H-h-20" >> $GITHUB_ENV ;;
            *)           echo "OVERLAY_POS=W-w-20:20"     >> $GITHUB_ENV ;;
          esac

      # ─── Main Stream Loop ───────────────────────────────────────────────────
      - name: Start 24/7 HD Stream
        run: |
          echo "=============================="
          echo "Stream shuru: $(date)"
          echo "Quality: $QUALITY | Bitrate: $VBR"
          echo "=============================="

          # ── Video list: URL|Title ──
          VIDEOS=(
            "https://muaaziqbalvip.github.io/Milive2/6.mp4|PANIYON KI DUA"
            "https://muaaziqbalvip.github.io/Milive2/1.mp4|FAJAR KA SUKOON"
            "https://muaaziqbalvip.github.io/Milive2/2.mp4|SUKOON-E-ISHA"
            "https://muaaziqbalvip.github.io/Milive2/5.mp4|ROH KI PYASS"
            "https://muaaziqbalvip.github.io/Milive2/3.mp4|TSKEEN SE POUR"
            "https://muaaziqbalvip.github.io/Milive2/4.mp4|SUCH KI TALWAR"
          )

          AD_URL="https://muaaziqbalvip.github.io/Milive2/0.mp4"
          AD_TITLE="--- Special OFFER"

          TOTAL=${#VIDEOS[@]}

          # ── Pakistan Standard Time = UTC+5 ──
          # drawtext se live clock: Pakistan = utc+5*3600 seconds offset
          PKT_OFFSET=18000

          # ── FFmpeg stream karne ka function with full retry ──
          stream_video() {
            local VID_URL="$1"
            local NOW_TITLE="$2"
            local NEXT_TITLE="$3"
            local MAX_RETRIES=5
            local ATTEMPT=0
            local SUCCESS=0

            while [ $ATTEMPT -lt $MAX_RETRIES ]; do
              ATTEMPT=$((ATTEMPT + 1))
              echo "[$(date)] Attempt $ATTEMPT/$MAX_RETRIES: $NOW_TITLE"

              ffmpeg \
                -re \
                -fflags +genpts+igndts \
                -err_detect ignore_err \
                -ignore_unknown \
                -i "$VID_URL" \
                -i logo.png \
                -filter_complex \
                  "[0:v]scale=1920:1080:force_original_aspect_ratio=decrease,\
                   pad=1920:1080:(ow-iw)/2:(oh-ih)/2:black,\
                   setsar=1,fps=30[base];\
                   [1:v]format=rgba,colorchannelmixer=aa=0.85[logo];\
                   [base][logo]overlay=${OVERLAY_POS}:format=auto[withlogo];\
                   [withlogo]drawtext=\
                     text='NOW\\: ${NOW_TITLE}':fontsize=32:fontcolor=white:\
                     box=1:boxcolor=black@0.6:boxborderw=8:\
                     x=20:y=H-th-90:shadowx=2:shadowy=2,\
                   drawtext=\
                     text='NEXT\\: ${NEXT_TITLE}':fontsize=26:fontcolor=yellow:\
                     box=1:boxcolor=black@0.6:boxborderw=8:\
                     x=20:y=H-th-45:shadowx=2:shadowy=2,\
                   drawtext=\
 text='%{localtime\\:%I\\\\:%M\\\\:%S %p}':\
 
 fontsize=28:fontcolor=white:\
 
 box=1:boxcolor=0x00000099:boxborderw=8:\
 
 x=W-tw-20:y=20:shadowx=2:shadowy=2[outv]" \
                -map "[outv]" \
                -map 0:a \
                -c:v libx264 \
                -preset "$PRESET" \
                -tune zerolatency \
                -profile:v high \
                -level 4.2 \
                -b:v "$VBR" \
                -maxrate "$MAXR" \
                -bufsize "$BUFS" \
                -g 60 \
                -keyint_min 60 \
                -sc_threshold 0 \
                -pix_fmt yuv420p \
                -c:a aac \
                -b:a 160k \
                -ar 44100 \
                -ac 2 \
                -flvflags no_duration_filesize \
                -f flv \
                "${RTMP_URL}/${STREAM_KEY}" \
                2>&1 | tee -a stream.log

              EXIT_CODE=${PIPESTATUS[0]}
              echo "[$(date)] Exit code: $EXIT_CODE | Video: $NOW_TITLE"

              # Exit code 0 = video puri chal gayi, success
              if [ "$EXIT_CODE" -eq 0 ]; then
                SUCCESS=1
                break
              fi

              # Exit code 1 = ffmpeg error, retry
              echo "[$(date)] !! Error on attempt $ATTEMPT. Retry in 5s..."
              sleep 5
            done

            if [ "$SUCCESS" -ne 1 ]; then
              echo "[$(date)] !! $MAX_RETRIES attempts failed for: $NOW_TITLE — skip kar rahe hain"
            fi
          }

          # ── Infinite playlist loop ──
          CYCLE=0
          while true; do
            CYCLE=$((CYCLE + 1))
            echo "=============================="
            echo "[$(date)] === CYCLE $CYCLE START ==="
            echo "=============================="

            for (( i=0; i<TOTAL; i++ )); do

              CURRENT_ENTRY="${VIDEOS[$i]}"
              CURRENT_URL="${CURRENT_ENTRY%%|*}"
              CURRENT_TITLE="${CURRENT_ENTRY##*|}"

              NEXT_INDEX=$(( (i+1) % TOTAL ))
              NEXT_ENTRY="${VIDEOS[$NEXT_INDEX]}"
              NEXT_TITLE="${NEXT_ENTRY##*|}"

              echo "=============================="
              echo "[$(date)] NOW PLAYING: $CURRENT_TITLE"
              echo "[$(date)] UP NEXT:     $NEXT_TITLE"
              echo "=============================="

              # ── Main video stream (with retry) ──
              stream_video "$CURRENT_URL" "$CURRENT_TITLE" "$NEXT_TITLE"

              # ── Ad chalao har video ke baad ──
              echo "[$(date)] === AD Playing ==="
              stream_video "$AD_URL" "$AD_TITLE" "$NEXT_TITLE"

              echo "[$(date)] === AD done. Next video loading... ==="
              sleep 2

            done

            echo "[$(date)] === CYCLE $CYCLE COMPLETE. Restarting playlist... ==="
            sleep 3

          done

      - name: Upload Stream Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stream-log-${{ github.run_number }}
          path: stream.log
          retention-days: 3
