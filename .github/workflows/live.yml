name: YouTube Live Stream

on:
workflow_dispatch:
schedule:
- cron: '0 */5 * * *'

jobs:
stream:
runs-on: ubuntu-latest
timeout-minutes: 350

steps:
  - name: Install FFmpeg
    run: |
      sudo apt-get update
      sudo apt-get install -y ffmpeg wget

  - name: Download Logo
    run: |
      wget -q "https://i.ibb.co/gZFSmCPw/file-00000000305071fa945b58b012ac072b-removebg-preview.png" -O logo.png || true

  - name: Start Stream
    env:
      STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
    run: |
      while true; do
        ffmpeg -re -stream_loop -1 \
          -i "https://www.dropbox.com/scl/fi/zv7z1sbm81ohxp04a5anx/lv_0_20260529230011.mp4?rlkey=gpuytnfr9wtp2yc1mzn5l0hil&st=3v3g7vuz&raw=1" \
          -i logo.png \
          -filter_complex "[1:v]scale=150:-1[logo];[0:v][logo]overlay=W-w-20:20" \
          -map 0:v -map 0:a? \
          -c:v libx264 \
          -preset veryfast \
          -pix_fmt yuv420p \
          -b:v 6000k \
          -maxrate 6000k \
          -bufsize 12000k \
          -g 120 \
          -c:a aac \
          -b:a 192k \
          -ar 48000 \
          -f flv \
          "rtmp://a.rtmp.youtube.com/live2/${STREAM_KEY}"

        echo "FFmpeg stopped. Restarting in 10 seconds..."
        sleep 10
      done